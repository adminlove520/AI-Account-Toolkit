name: Bug 报告 / Bug Report
description: 报告项目中的问题 / Report a bug in the project
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告 Bug！请提供尽可能详细的信息以帮助我们定位和解决问题。
        Thank you for reporting a bug! Please provide as much detail as possible to help us locate and solve the issue.
  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 详细描述发生了什么。/ Describe what happened.
      placeholder: 请提供清晰简洁的描述。/ Provide a clear and concise description.
    validations:
      required: true
  - type: dropdown
    id: submodule
    attributes:
      label: 受影响的子模块 / Submodule Affected
      description: 选择受影响的组件。/ Select the affected component.
      options:
        - 根项目 / Root Project
        - packages/openai/*
        - packages/claude/*
        - packages/codex/*
        - packages/gemini/*
        - packages/email/*
        - packages/general/*
        - 其他 / Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤 / Steps to Reproduce
      description: 如何复现该问题。/ How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Click on...
        3. Error...
    validations:
      required: true
  - type: textarea
    id: expected_vs_actual
    attributes:
      label: 期望行为与实际行为 / Expected vs Actual Behavior
      description: 期望发生什么？实际发生了什么？/ What did you expect to happen and what actually happened?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境信息 / Environment
      description: 操作系统, Python 版本, Node 版本等。/ OS, Python version, Node version, etc.
      placeholder: e.g. Windows 11, Python 3.10, Node 18
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志 / Logs
      description: 如果有错误日志或输出，请粘贴在这里。/ Paste any error logs or output here.
      render: shell
